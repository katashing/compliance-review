<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>公募基金推介材料审核样例库</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --text: #172033;
      --muted: #607086;
      --line: #dce4ef;
      --accent: #0f83d8;
      --danger: #df2b32;
      --warn: #b76a00;
      --shadow: 0 12px 34px rgba(32, 48, 72, 0.11);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--text);
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
    }

    .page {
      min-height: 100vh;
      padding: 24px 28px 32px;
    }

    .shell {
      max-width: 1180px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.25;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 11px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin: 18px 0;
    }

    .stat {
      padding: 16px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: 0 8px 22px rgba(32, 48, 72, 0.07);
    }

    .stat strong {
      display: block;
      font-size: 24px;
      line-height: 1.1;
    }

    .stat span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin: 20px 0 10px;
    }

    h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.35;
    }

    .sample-table {
      width: 100%;
      display: grid;
      gap: 0;
    }

    .metric-table {
      margin-bottom: 22px;
    }

    .metric-list {
      display: grid;
      gap: 0;
      margin-bottom: 22px;
    }

    .metric-headrow {
      display: grid;
      grid-template-columns: minmax(170px, 1.15fr) 88px minmax(190px, 1fr) minmax(190px, 1fr);
      gap: 12px;
      padding: 0 14px 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .metric-card {
      display: grid;
      grid-template-columns: minmax(170px, 1.15fr) 88px minmax(190px, 1fr) minmax(190px, 1fr);
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-bottom: 0;
      box-shadow: 0 8px 20px rgba(32, 48, 72, 0.05);
    }

    .metric-card:last-child {
      border-bottom: 1px solid var(--line);
    }

    .metric-card.overall {
      margin-bottom: 8px;
      background: #f7fbff;
      border-bottom: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .metric-header {
      min-width: 0;
    }

    .metric-title {
      min-width: 0;
    }

    .metric-title strong {
      display: block;
      font-size: 15px;
      line-height: 1.35;
    }

    .metric-title span {
      display: none;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .metric-total {
      min-width: 0;
      padding: 0;
      text-align: left;
    }

    .metric-total strong {
      display: block;
      font-size: 18px;
      line-height: 1;
    }

    .metric-total span {
      display: none;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .metric-item {
      min-width: 0;
      padding: 0;
    }

    .metric-label {
      display: none;
      margin: 0;
      font-size: 12px;
      font-weight: 900;
      line-height: 1.4;
    }

    .metric-label.found {
      color: #1f8a5b;
    }

    .metric-label.hit {
      color: #a66f00;
    }

    .metric-value {
      display: flex;
      align-items: baseline;
      justify-content: flex-start;
      gap: 8px;
      margin-top: 3px;
      font-variant-numeric: tabular-nums;
    }

    .metric-value strong {
      font-size: 18px;
      line-height: 1;
    }

    .metric-value span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .metric-bar {
      display: flex;
      position: relative;
      height: 8px;
      margin-top: 7px;
      overflow: hidden;
      background: #eef3f8;
      border-radius: 999px;
    }

    .bar-rest {
      background: #d7dee8;
    }

    .bar-part {
      min-width: 0;
      transition: width 160ms ease;
    }

    .bar-found {
      background: #1f8a5b;
    }

    .bar-hit {
      background: #f1b51c;
    }

    .metric-help {
      margin: -4px 0 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .metric-definitions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin: 24px 0 0;
    }

    .metric-definition {
      padding: 12px 14px;
      background: #fbfdff;
      border: 1px solid var(--line);
    }

    .metric-definition strong {
      display: block;
      font-size: 13px;
      line-height: 1.35;
    }

    .metric-definition code {
      display: block;
      margin-top: 7px;
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.5;
    }

    .metric-definition span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .sample-row {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) 64px 64px 64px 110px 110px 76px 64px;
      align-items: center;
      gap: 12px;
      min-height: 46px;
      padding: 8px 14px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-bottom: 0;
      box-shadow: 0 8px 20px rgba(32, 48, 72, 0.05);
      transition: background 120ms ease, border-color 120ms ease;
    }

    .sample-row:hover {
      background: #f8fbff;
      border-color: #c5d7eb;
    }

    .sample-row:last-child {
      border-bottom: 1px solid var(--line);
    }

    .sample-headrow {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) 64px 64px 64px 110px 110px 76px 64px;
      gap: 12px;
      padding: 0 14px 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .sample-main {
      min-width: 0;
    }

    .sample-title {
      display: flex;
      align-items: center;
      min-width: 0;
    }

    .sample-title strong {
      min-width: 0;
      overflow: hidden;
      color: var(--text);
      font-size: 14px;
      line-height: 1.35;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .sample-cell {
      min-width: 0;
      display: inline-flex;
      align-items: baseline;
      gap: 4px;
      color: var(--text);
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .sample-cell small {
      display: inline;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      line-height: 1;
    }

    .num {
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .verdict {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 24px;
      width: 52px;
      padding: 0;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .verdict.reject {
      color: #b81722;
      background: #fff0f1;
      border: 1px solid #ffc7cc;
    }

    .verdict.review {
      color: #996100;
      background: #fff8e6;
      border: 1px solid #f2d28b;
    }

    .verdict.pass {
      color: #1f7650;
      background: #ecfaf3;
      border: 1px solid #bce8cf;
    }

    .open-link {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 12px;
      color: #fff;
      background: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 4px;
      text-decoration: none;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .open-link:hover,
    .open-link:focus-visible {
      background: #0b70bb;
      outline: none;
    }

    .sample-actions {
      justify-self: start;
    }

    .sample-date {
      justify-self: start;
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
    }

    .sort-button {
      appearance: none;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      width: 100%;
      min-height: 24px;
      padding: 0;
      color: inherit;
      background: transparent;
      border: 0;
      font: inherit;
      font-size: 12px;
      font-weight: 900;
      text-align: left;
      cursor: pointer;
    }

    .sort-button::after {
      content: "";
      color: currentColor;
      font-size: 14px;
      font-weight: 900;
      line-height: 1;
    }

    .sort-button.active::after {
      content: "↓";
    }

    .sort-button.active.asc::after {
      content: "↑";
    }

    .sort-button:hover,
    .sort-button:focus-visible {
      color: var(--accent);
      outline: none;
    }

    .sort-button.active {
      color: var(--accent);
    }

    .sort-button.active {
      color: var(--accent);
    }

    .sort-button.active {
      color: var(--accent);
    }

    .sort-button.active {
      color: var(--accent);
    }

    .sort-button.active {
      color: var(--accent);
    }

    .sort-button.active {
      color: var(--accent);
    }

    .sort-button.active {
      color: var(--accent);
    }

    .sort-button.active {
      color: var(--accent);
    }

    .sort-button.active {
      color: var(--accent);
    }

    .sort-button.active {
      color: var(--accent);
    }

    .empty {
      padding: 22px;
      background: var(--panel);
      border: 1px dashed var(--line);
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    @media (max-width: 760px) {
      .page {
        padding: 18px;
      }

      .header {
        align-items: flex-start;
        flex-direction: column;
      }

      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .metric-card {
        grid-template-columns: 1fr;
      }

      .metric-headrow {
        display: none;
      }

      .metric-item {
        grid-template-columns: 64px 1fr;
      }

      .metric-definitions {
        grid-template-columns: 1fr;
      }

      .sample-row {
        grid-template-columns: 1fr;
      }

      .sample-headrow {
        display: none;
      }

      .sample-title strong {
        white-space: normal;
      }

      .sample-actions {
        justify-self: start;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="shell">
      <header class="header">
        <div>
          <h1>公募基金推介材料审核样例库</h1>
        </div>
      </header>

      <section class="stats" aria-label="样例统计">
        <div class="stat"><strong id="sampleCount">0</strong><span>样例数量</span></div>
        <div class="stat"><strong id="issueCount">0</strong><span>审核点</span></div>
        <div class="stat"><strong id="ruleCount">2</strong><span>业务规则</span></div>
      </section>

      <section>
        <div class="section-head">
          <h2>业务指标</h2>
        </div>
        <div class="metric-headrow">
          <button class="sort-button metric-sort-button" type="button" data-metric-sort="category">审核类别</button>
          <button class="sort-button metric-sort-button" type="button" data-metric-sort="totalAuditPoints">审核点</button>
          <button class="sort-button metric-sort-button active" type="button" data-metric-sort="foundRate">违规检出率</button>
          <button class="sort-button metric-sort-button" type="button" data-metric-sort="hitRate">有效命中率</button>
        </div>
        <div class="metric-list" id="businessMetrics"></div>
      </section>

      <section>
        <div class="section-head">
          <h2>样例文件</h2>
          <span class="pill">点击表头排序</span>
        </div>
        <div class="sample-headrow">
          <button class="sort-button" type="button" data-sort="title">文件名</button>
          <button class="sort-button" type="button" data-sort="verdict">AI结论</button>
          <button class="sort-button" type="button" data-sort="manualVerdict">人工结论</button>
          <button class="sort-button" type="button" data-sort="issues">审核点</button>
          <button class="sort-button" type="button" data-sort="foundRate">违规检出率</button>
          <button class="sort-button" type="button" data-sort="hitRate">有效命中率</button>
          <button class="sort-button active" type="button" data-sort="date">提审日期</button>
          <span>操作</span>
        </div>
        <div class="sample-table" id="samples"></div>
      </section>

      <section aria-label="指标说明">
        <div class="section-head">
          <h2>指标说明</h2>
        </div>
        <div class="metric-definitions">
          <div class="metric-definition">
            <strong>违规检出率</strong>
            <code>AI 已检出违规审核点数 / 应检出违规审核点总数 x 100%</code>
            <span>用于衡量系统有没有漏掉违规，数值越高表示对真实违规问题的覆盖越充分。</span>
          </div>
          <div class="metric-definition">
            <strong>有效命中率</strong>
            <code>AI 有效命中审核点数 / AI 标出审核点总数 x 100%</code>
            <span>用于衡量系统标出来的是不是真的违规，数值越高表示误报越少、复核效率越高。</span>
          </div>
        </div>
      </section>
    </div>
  </main>

    const sampleList = document.querySelector("#samples");
    const metricList = document.querySelector("#businessMetrics");
    const sortButtons = Array.from(document.querySelectorAll(".sort-button"));
    const sampleSortButtons = Array.from(document.querySelectorAll("[data-sort]"));
    const metricSortButtons = Array.from(document.querySelectorAll("[data-metric-sort]"));
    let currentSort = "date";
    let sortAscending = false;
    let currentMetricSort = "foundRate";
    let metricSortAscending = false;

    function formatRate(numerator, denominator) {
      if (!denominator) return "-";
      return `${Math.round((numerator / denominator) * 100)}%`;
    }

    function sampleMetricTotal(sample) {
      return sample.metricTotal || {
        category: "文件总计",
        totalAuditPoints: 0,
        aiFound: 0,
        aiChecked: 0,
        hitAuditPoints: 0
      };
    }

    function foundRateValue(sample) {
      const total = sampleMetricTotal(sample);
      return total.totalAuditPoints ? total.aiFound / total.totalAuditPoints : 0;
    }

    function hitRateValue(sample) {
      const total = sampleMetricTotal(sample);
      return total.aiChecked ? total.hitAuditPoints / total.aiChecked : 0;
    }

    function sortedSamples() {
      const verdictRank = { "退回": 2, "通过": 1 };
      const valueFor = (sample) => {
        if (currentSort === "title") return sample.title;
        if (currentSort === "verdict") return verdictRank[sample.verdict] || 0;
        if (currentSort === "manualVerdict") return verdictRank[sample.manualVerdict] || 0;
        if (currentSort === "issues") return sample.issues;
        if (currentSort === "foundRate") return foundRateValue(sample);
        if (currentSort === "hitRate") return hitRateValue(sample);
        return sample.date;
      };

      return [...samples].sort((a, b) => {
        const av = valueFor(a);
        const bv = valueFor(b);
        const result = typeof av === "string" ? av.localeCompare(bv, "zh-Hans-CN") : av - bv;
        return sortAscending ? result : -result;
      });
    }

    function renderSortState() {
      sampleSortButtons.forEach((button) => {
        const active = button.dataset.sort === currentSort;
        button.classList.toggle("active", active);
        button.classList.toggle("asc", active && sortAscending);
        const direction = active ? (sortAscending ? "升序" : "降序") : "未排序";
        button.setAttribute("aria-label", `${button.textContent}，${direction}，点击排序`);
      });
    }

    function metricFoundRateValue(metric) {
      return metric.foundRate?.value ?? 0;
    }

    function metricHitRateValue(metric) {
      return metric.hitRate?.value ?? 0;
    }

    function sortedMetrics(metrics) {
      const valueFor = (metric) => {
        if (currentMetricSort === "category") return metric.category;
        if (currentMetricSort === "totalAuditPoints") return metric.totalAuditPoints;
        if (currentMetricSort === "hitRate") return metricHitRateValue(metric);
        return metricFoundRateValue(metric);
      };

      return [...metrics].sort((a, b) => {
        const av = valueFor(a);
        const bv = valueFor(b);
        const result = typeof av === "string" ? av.localeCompare(bv, "zh-Hans-CN") : av - bv;
        return metricSortAscending ? result : -result;
      });
    }

    function renderMetricSortState() {
      metricSortButtons.forEach((button) => {
        const active = button.dataset.metricSort === currentMetricSort;
        button.classList.toggle("active", active);
        button.classList.toggle("asc", active && metricSortAscending);
        const direction = active ? (metricSortAscending ? "升序" : "降序") : "未排序";
        button.setAttribute("aria-label", `${button.textContent}，${direction}，点击排序`);
      });
    }

    function renderMetricRow(metric, options = {}) {
      const foundRateValue = metric.foundRate?.value ?? 0;
      const hitRateValue = metric.hitRate?.value ?? 0;
      const foundRate = metric.foundRate?.percent ?? formatRate(metric.aiFound, metric.totalAuditPoints);
      const hitRate = metric.hitRate?.percent ?? formatRate(metric.hitAuditPoints, metric.aiChecked);

      return `
        <article class="metric-card ${options.overall ? "overall" : ""}">
          <div class="metric-header">
            <div class="metric-title">
              <strong>${metric.category}</strong>
            </div>
          </div>
          <div class="metric-total">
            <strong>${metric.totalAuditPoints}</strong>
            <span>审核点</span>
          </div>
          <div class="metric-item">
            <div class="metric-value"><strong>${foundRate}</strong><span>${metric.aiFound}/${metric.totalAuditPoints}</span></div>
            <div class="metric-bar" aria-label="${metric.category} 违规检出率 ${foundRate}">
              <div class="bar-part bar-found" style="width:${foundRateValue * 100}%"></div>
              <div class="bar-part bar-rest" style="width:${(1 - foundRateValue) * 100}%"></div>
            </div>
          </div>
          <div class="metric-item">
            <div class="metric-value"><strong>${hitRate}</strong><span>${metric.hitAuditPoints}/${metric.aiChecked}</span></div>
            <div class="metric-bar" aria-label="${metric.category} 有效命中率 ${hitRate}">
              <div class="bar-part bar-hit" style="width:${hitRateValue * 100}%"></div>
              <div class="bar-part bar-rest" style="width:${(1 - hitRateValue) * 100}%"></div>
            </div>
          </div>
        </article>
      `;
    }

    function renderStats() {
      const indexStats = runMetrics.index?.stats || {};
      document.querySelector("#sampleCount").textContent = indexStats.sampleCount ?? samples.length;
      document.querySelector("#issueCount").textContent = indexStats.issueCount ?? samples.reduce((sum, sample) => sum + sample.issues, 0);
    }

    function renderSamples() {
      if (samples.length === 0) {
        sampleList.innerHTML = '<div class="empty">暂无样例。将每个样例放入 samples/ 下的独立文件夹后，可在这里增加对应入口。</div>';
        return;
      }

      sampleList.innerHTML = sortedSamples().map((sample) => {
        const metricTotal = sampleMetricTotal(sample);
        return `
          <article class="sample-row">
            <div class="sample-main">
              <div class="sample-title">
                <strong>${sample.title}</strong>
              </div>
            </div>
            <span class="verdict ${sample.verdictClass}">${sample.verdict}</span>
            <span class="verdict ${sample.manualVerdictClass}">${sample.manualVerdict}</span>
            <span class="sample-cell">${sample.issues}</span>
            <span class="sample-cell">${metricTotal.foundRate?.percent ?? formatRate(metricTotal.aiFound, metricTotal.totalAuditPoints)} <small>${metricTotal.aiFound}/${metricTotal.totalAuditPoints}</small></span>
            <span class="sample-cell">${metricTotal.hitRate?.percent ?? formatRate(metricTotal.hitAuditPoints, metricTotal.aiChecked)} <small>${metricTotal.hitAuditPoints}/${metricTotal.aiChecked}</small></span>
            <span class="sample-date">${sample.date}</span>
            <div class="sample-actions">
              <a class="open-link" href="${sample.href}">查看</a>
            </div>
          </article>
        `;
      }).join("");
    }

    function renderBusinessMetrics() {
      const metrics = runMetrics.index?.businessMetrics || [runMetrics.overall, ...(runMetrics.byCategory || [])].filter(Boolean);
      if (metrics.length === 0) {
        metricList.innerHTML = '<div class="empty">暂无业务指标。样例入库后，可按分类记录违规检出率和有效命中率。</div>';
        return;
      }

      const [overall, ...byCategory] = metrics;
      metricList.innerHTML = [
        renderMetricRow(overall, { overall: true }),
        ...sortedMetrics(byCategory).map((metric) => renderMetricRow(metric))
      ].join("");
    }

    renderStats();
    renderBusinessMetrics();
    renderSamples();
    renderSortState();
    renderMetricSortState();
    sampleSortButtons.forEach((button) => {
      button.addEventListener("click", () => {
        if (currentSort === button.dataset.sort) {
          sortAscending = !sortAscending;
        } else {
          currentSort = button.dataset.sort;
          sortAscending = false;
        }
        renderSortState();
        renderSamples();
      });
    });
    metricSortButtons.forEach((button) => {
      button.addEventListener("click", () => {
        if (currentMetricSort === button.dataset.metricSort) {
          metricSortAscending = !metricSortAscending;
        } else {
          currentMetricSort = button.dataset.metricSort;
          metricSortAscending = false;
        }
        renderMetricSortState();
        renderBusinessMetrics();
      });
    });
